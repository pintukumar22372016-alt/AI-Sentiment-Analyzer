<!DOCTYPE html>
<html>
<head>
<title>Digit Recognition AI</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    text-align: center;
}

canvas {
    border: 2px solid white;
    background: black;
    cursor: crosshair;
}

button {
    margin: 10px;
    padding: 10px 20px;
    border: none;
    background: #22c55e;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

.grid {
    display: grid;
    grid-template-columns: repeat(8, 20px);
    gap: 2px;
    justify-content: center;
    margin-top: 20px;
}

.cell {
    width: 20px;
    height: 20px;
    background: #111;
}
</style>

</head>

<body>

<h1>🔢 Draw Digit Recognition (SVM)</h1>

<canvas id="canvas" width="200" height="200"></canvas><br>

<button onclick="clearCanvas()">Clear</button>
<button onclick="predict()">Predict</button>

<h2 id="result"></h2>
<p id="confidence"></p>

<div class="grid" id="grid"></div>

<script>
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let drawing = false;

canvas.addEventListener("mousedown", () => drawing = true);
canvas.addEventListener("mouseup", () => drawing = false);
canvas.addEventListener("mousemove", draw);

function draw(e){
    if(!drawing) return;

    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(e.offsetX, e.offsetY, 8, 0, Math.PI * 2);
    ctx.fill();
}

function clearCanvas(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    document.getElementById("result").innerText = "";
    document.getElementById("confidence").innerText = "";
    document.getElementById("grid").innerHTML = "";
}

function getPixels(){
    let imgData = ctx.getImageData(0, 0, 200, 200).data;
    let pixels = [];

    for(let y=0; y<8; y++){
        for(let x=0; x<8; x++){
            let sum = 0;

            for(let i=0; i<25; i++){
                let px = Math.floor(x*25 + i%5*5);
                let py = Math.floor(y*25 + Math.floor(i/5)*5);

                let index = (py*200 + px) * 4;
                sum += imgData[index];
            }

            pixels.push(Math.round(sum / 25 / 16));
        }
    }

    return pixels;
}

function showGrid(pixels){
    let grid = document.getElementById("grid");
    grid.innerHTML = "";

    pixels.forEach(val => {
        let div = document.createElement("div");
        div.className = "cell";
        div.style.background = `rgb(${val*16},${val*16},${val*16})`;
        grid.appendChild(div);
    });
}

function predict(){
    let pixels = getPixels();

    showGrid(pixels);

    fetch('/predict', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({pixels: pixels})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText = "Prediction: " + data.prediction;
        document.getElementById("confidence").innerText = "Confidence: " + data.confidence + "%";
    });
}
</script>

</body>
</html>
